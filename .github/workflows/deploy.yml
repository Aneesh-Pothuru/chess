# Build and deploy the app to GitHub Pages on every push to main.
# Coach briefings land on main via promote-coach.yml, whose GITHUB_TOKEN push
# cannot fire this push trigger — it dispatches this workflow explicitly
# instead, so the hosted app still always serves the latest briefing.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Progress syncs and coach logs aren't part of the built site — don't
    # redeploy for them (this filter only sees human/app pushes; promoted
    # briefing commits arrive via workflow_dispatch above it).
    paths-ignore:
      - 'progress/**'
      - 'coach-log/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci # postinstall copies the Stockfish WASM into public/
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
